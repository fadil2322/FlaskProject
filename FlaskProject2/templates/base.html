<!DOCTYPE html>
<html lang="en" data-theme="{{ theme }}">

<head>
  <meta charset="UTF-8" />
  <title>{% block title %}{% endblock %}</title>

  <!-- CSS & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.5/css/dataTables.bootstrap5.min.css">

  <!-- JS Libs -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* Theme Colors */
    [data-theme="light"] body {
      background: #f8f9fa;
      color: #000;
    }

    [data-theme="dark"] body {
      background: #121212;
      color: #fff;
    }

    /* Sidebar */
    .sidebar {
      height: 100vh;
      background: linear-gradient(180deg, #212529, #343a40);
      position: fixed;
      top: 0;
      left: 0;
      width: 220px;
      padding: 1.5rem 1rem;
      transition: all 0.3s ease;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
    }

    .sidebar h4 {
      font-weight: bold;
      letter-spacing: 1px;
    }

    .sidebar a {
      color: #ddd;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      text-decoration: none;
      border-radius: 0.35rem;
      transition: background 0.2s ease, padding-left 0.2s ease;
    }

    .sidebar a:hover {
      background: #495057;
      padding-left: 1.3rem;
      color: #fff;
    }

    /* Content Area */
    .content {
      margin-left: 220px;
      padding: 2rem;
      transition: margin-left 0.3s ease;
    }

    /* Topbar */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    /* Responsive Sidebar */
    @media (max-width: 768px) {
      .sidebar {
        width: 70px;
        padding: 1rem 0.5rem;
      }

      .sidebar h4 {
        display: none;
      }

      .sidebar a {
        justify-content: center;
        padding: 0.75rem;
      }

      .sidebar a span {
        display: none;
      }

      .content {
        margin-left: 70px;
      }
    }
  </style>
</head>

<body>
  <!-- Sidebar -->
  <div class="sidebar">
    <h4 class="text-white mb-4">Admin</h4>
    <a href="{{ url_for('dashboard.dashboard') }}">
      <i class="bi bi-speedometer2 me-2"></i> <span>Dashboard</span>
    </a>
    <a href="{{ url_for('sertifikasi.index') }}">
      <i class="bi bi-file-earmark-text me-2"></i> <span>Sertifikasi</span>
    </a>
  </div>

  <!-- Main Content -->
  <div class="content">
    <header class="topbar">
      <h2 class="fw-bold">{% block header %}{% endblock %}</h2>

      <div class="dropdown">
        <i class="bi bi-bell fs-5 me-4"></i>
        <a class="dropdown-toggle text-decoration-none" href="#" role="button" id="profileDropdown"
          data-bs-toggle="dropdown" aria-expanded="false">
          <i class="bi bi-person-circle fs-4"></i>
        </a>
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
          <li class="px-3 py-2">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" id="themeSwitch" {% if theme=='dark' %}checked{% endif %}>
              <label class="form-check-label ms-2" for="themeSwitch">Dark Mode</label>
            </div>
          </li>
          <li>
            <hr class="dropdown-divider">
          </li>
          <li>
            <a class="dropdown-item" href="{{ url_for('auth.logout') }}">
              <i class="bi bi-box-arrow-right me-2"></i> Logout
            </a>
          </li>
        </ul>
      </div>
    </header>

    {% block content %}{% endblock %}
  </div>

  <!-- Bootstrap Bundle JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Theme Toggle AJAX -->
  <script>
    $('#themeSwitch').on('change', function () {
      let newTheme = $(this).is(':checked') ? 'dark' : 'light';
      $.ajax({
        url: "{{ url_for('dashboard.toggle_theme') }}",
        type: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({ theme: newTheme }),
        success: function (res) {
          if (res.status === 'success') {
            document.documentElement.setAttribute('data-theme', newTheme);
          }
        }
      });
    });
  </script>
</body>

</html>
